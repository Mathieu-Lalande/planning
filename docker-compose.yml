services:
  postgres:
    image: postgres:16-alpine
    container_name: btv-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-btv_planning}
      POSTGRES_USER: ${POSTGRES_USER:-btv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btv_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btv} -d ${POSTGRES_DB:-btv_planning}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    container_name: btv-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-btv}:${POSTGRES_PASSWORD:-btv_password}@postgres:5432/${POSTGRES_DB:-btv_planning}
      PORT: ${API_PORT:-3001}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # pgAdmin — décommenter si besoin d'une interface graphique pour la BDD
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: btv-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@bourgestelevision.fr}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

volumes:
  postgres_data:
